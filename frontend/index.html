<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoS2 Raman Hyperspectral Analysis</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .container {
            display: flex;
            width: 100%;
            gap: 20px;
        }
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
        }
        .right-panel {
            flex: 1;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            font-weight: 500;
        }
        .image-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        img {
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            border-radius: 4px;
            cursor: crosshair;
            image-rendering: pixelated;
        }
        #chart {
            flex: 1;
            width: 100%;
        }
        .coords {
            margin-top: 10px;
            font-family: monospace;
            font-size: 1.1em;
            color: #4CAF50;
        }
        .cursor-box {
            position: absolute;
            border: 2px solid #FF3366;
            pointer-events: none;
            display: none;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.8);
        }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(30,30,30,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <h2>Hyperspectral Map Grid (Hover to Analyze)</h2>
        <div class="image-container" id="img-container">
            <img src="cropped-screenshot.png" id="map-image" alt="Microscope view">
            <div class="cursor-box" id="cursor-box"></div>
        </div>
        <div class="coords">Pixel: <span id="coord-text">Hover over image</span></div>
    </div>
    <div class="right-panel">
        <h2>Spectra Details Page</h2>
        <div id="chart"></div>
        <div class="loading-overlay" id="loading">Loading...</div>
    </div>
</div>

<script>
    const mapImage = document.getElementById('map-image');
    const cursorBox = document.getElementById('cursor-box');
    const coordText = document.getElementById('coord-text');
    const GRID_SIZE = 51;
    let currentX = -1;
    let currentY = -1;
    
    // Initialize empty chart
    Plotly.newPlot('chart', [], {
        title: 'Hover over a pixel to view spectra',
        paper_bgcolor: '#1e1e1e',
        plot_bgcolor: '#1e1e1e',
        font: { color: '#e0e0e0' }
    });

    mapImage.addEventListener('mousemove', (e) => {
        const rect = mapImage.getBoundingClientRect();
        
        // Calculate coordinates relative to image (0 to 1)
        const relX = (e.clientX - rect.left) / rect.width;
        const relY = (e.clientY - rect.top) / rect.height;
        
        // Map to 51x51 grid
        const x = Math.floor(relX * GRID_SIZE);
        const y = Math.floor(relY * GRID_SIZE);
        
        // Ensure bounds
        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
            updateCursorBox(x, y, rect);
            
            if (x !== currentX || y !== currentY) {
                currentX = x;
                currentY = y;
                coordText.innerText = `(${x}, ${y})`;
                fetchSpectrum(x, y);
            }
        }
    });

    mapImage.addEventListener('mouseleave', () => {
        cursorBox.style.display = 'none';
        coordText.innerText = `Hover over image`;
        currentX = -1;
        currentY = -1;
    });

    function updateCursorBox(x, y, rect) {
        const boxWidth = rect.width / GRID_SIZE;
        const boxHeight = rect.height / GRID_SIZE;
        cursorBox.style.width = `${boxWidth}px`;
        cursorBox.style.height = `${boxHeight}px`;
        cursorBox.style.left = `${x * boxWidth}px`;
        cursorBox.style.top = `${y * boxHeight}px`;
        cursorBox.style.display = 'block';
    }

    async function fetchSpectrum(x, y) {
        try {
            const response = await fetch(`/data/${x}/${y}`);
            if (!response.ok) return;
            const data = await response.json();
            updateChart(data, x, y);
        } catch (error) {
            console.error("Error fetching spectrum data:", error);
        }
    }

    function updateChart(data, x, y) {
        const traceData = {
            x: data.rs,
            y: data.norm_spec,
            mode: 'markers',
            type: 'scatter',
            name: 'Data (bg sub)',
            marker: { color: 'rgba(31, 119, 180, 0.5)', size: 4 }
        };

        const fitCurve = {
            x: data.x_fit,
            y: data.y_fit_curve,
            mode: 'lines',
            type: 'scatter',
            name: 'Double Lorentzian Fit',
            line: { color: 'red', width: 2 }
        };

        const l1Curve = {
            x: data.x_fit,
            y: data.L1_curve,
            mode: 'lines',
            type: 'scatter',
            name: 'Peak 1 (E2g) Component',
            line: { color: 'green', dash: 'dash' }
        };

        const l2Curve = {
            x: data.x_fit,
            y: data.L2_curve,
            mode: 'lines',
            type: 'scatter',
            name: 'Peak 2 (A1g) Component',
            line: { color: 'blue', dash: 'dash' }
        };

        const annotText = 
            `<b>Peak 1 (E2g):</b><br>` +
            `  C = ${data.c1.toFixed(2)} cm<sup>-1</sup><br>` +
            `  FWHM = ${data.fwhm1.toFixed(2)} cm<sup>-1</sup><br><br>` +
            `<b>Peak 2 (A1g):</b><br>` +
            `  C = ${data.c2.toFixed(2)} cm<sup>-1</sup><br>` +
            `  FWHM = ${data.fwhm2.toFixed(2)} cm<sup>-1</sup><br><br>` +
            `<b>Integrated Intensity:</b> ${data.integrated_intensity.toExponential(2)}<br>` +
            `<b>Δ:</b> ${data.magic_number.toFixed(2)} cm<sup>-1</sup><br>` +
            `<b>Bg:</b> ${data.bg_noise.toFixed(2)} a.u.`;

        const layout = {
            title: `Pixel (${x}, ${y}) Spectra & Fits`,
            paper_bgcolor: '#1e1e1e',
            plot_bgcolor: '#252525',
            font: { color: '#e0e0e0' },
            xaxis: { 
                title: 'Raman Shift (cm⁻¹)',
                gridcolor: '#444',
                range: [360, 430] // focus on fit region
            },
            yaxis: { 
                title: 'Normalized Intensity (a.u.)',
                gridcolor: '#444',
                range: [0, Math.max(1.2, Math.max(...data.y_fit_curve) * 1.1)]
            },
            legend: { x: 1, xanchor: 'right', y: 1 },
            annotations: [{
                x: 0.05,
                y: 0.95,
                xref: 'paper',
                yref: 'paper',
                text: annotText,
                showarrow: false,
                bgcolor: 'rgba(30, 30, 30, 0.8)',
                bordercolor: '#555',
                borderwidth: 1,
                borderpad: 8,
                align: 'left',
                font: { size: 12, family: 'monospace' }
            }],
            margin: { l: 60, r: 20, t: 60, b: 60 }
        };

        Plotly.react('chart', [traceData, fitCurve, l1Curve, l2Curve], layout, {responsive: true});
    }
</script>

</body>
</html>
